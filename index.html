<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Finance Zone</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0b0f17">

<!-- iPhone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finance Zone">

<link rel="apple-touch-icon" href="icon-192.png">
</head>

<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="logo">₿</div>
      <div>
        <div class="title">Money Tracker</div>
        <div class="subtitle">Личный бюджет</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn ghost" id="btnExport">Экспорт</button>
      <button class="btn" id="btnAddOpen">+ Транзакция</button>
    </div>
  </header>

  <section class="grid">
    <div class="card balance">
      <div class="card-head">
        <div>
          <div class="label">Текущий баланс</div>
          <div class="big" id="balanceValue">₪ 0</div>
        </div>
        <div class="pill" id="monthPill">Март</div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="label">Доход</div>
          <div class="pos" id="incomeValue">+ ₪ 0</div>
        </div>
        <div class="stat">
          <div class="label">Расход</div>
          <div class="neg" id="expenseValue">- ₪ 0</div>
        </div>
      </div>
    </div>

    <div class="card quickadd" id="addPanel">
      <div class="card-head">
        <div class="h2">Добавить транзакцию</div>
        <div class="hint">Быстро и удобно</div>
      </div>

      <div class="form">
        <div class="field">
          <label>Сумма</label>
          <input id="amount" type="number" placeholder="Напр. 120" />
        </div>

        <div class="field">
          <label>Тип</label>
          <div class="segmented">
            <button class="seg active" id="typeExpense" type="button">Расход</button>
            <button class="seg" id="typeIncome" type="button">Доход</button>
          </div>
        </div>

        <div class="field">
          <label>Категория</label>
          <select id="category">
            <option>Еда</option>
            <option>Транспорт</option>
            <option>Подписки</option>
            <option>Развлечения</option>
            <option>Другое</option>
          </select>
        </div>

        <div class="field">
          <label>Комментарий</label>
          <input id="note" type="text" placeholder="Напр. шаурма 😅" />
        </div>

        <button class="btn wide" id="addBtn">Добавить</button>
      </div>
    </div>

    <div class="card history">
      <div class="card-head row">
        <div>
          <div class="h2">История</div>
          <div class="hint">Последние операции</div>
        </div>

        <div class="filters">
          <input id="search" class="search" placeholder="Поиск..." />
          <select id="filter">
            <option value="all">Все</option>
            <option value="income">Доход</option>
            <option value="expense">Расход</option>
          </select>
        </div>
      </div>

      <div class="list" id="list">
        <!-- Транзакции рисуешь JS-ом -->
        <!-- Пример айтема:
        <div class="item">
          <div class="icon neg">−</div>
          <div class="meta">
            <div class="name">Еда <span class="tag">шаурма</span></div>
            <div class="date">03.03.2026</div>
          </div>
          <div class="sum neg">- ₪ 45</div>
        </div>
        -->
      </div>
    </div>
  </section>
</div>

  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");
    }
  </script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js')
    .then(() => console.log("Service Worker registered"))
    .catch(err => console.log("SW error:", err));
}
</script>
</body>
</html>
